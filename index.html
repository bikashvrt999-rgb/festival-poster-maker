<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভারতীয় উৎসব পোস্টার মেকার</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0f0f1a;font-family:'Noto Serif Bengali',serif;display:flex;flex-direction:column;align-items:center;padding:20px 10px 60px;gap:20px;}

.app-header{text-align:center;padding:18px 0 8px;}
.app-header h1{font-size:1.5rem;font-weight:700;color:#ffd700;letter-spacing:1px;}
.app-header p{color:rgba(255,255,255,.5);font-size:.8rem;margin-top:4px;}

.festival-selector{width:100%;max-width:900px;}
.festival-selector h2{color:rgba(255,255,255,.7);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.festival-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.fest-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.fest-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);transform:translateY(-2px);}
.fest-btn.active{border-color:var(--fest-color,#ffd700);background:rgba(255,215,0,.12);box-shadow:0 0 16px rgba(255,215,0,.2);}
.fest-btn .fest-icon{font-size:1.6rem;}
.fest-btn .fest-name{font-size:.65rem;color:rgba(255,255,255,.85);line-height:1.3;}

.main-layout{display:flex;gap:24px;width:100%;max-width:900px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}

/* POSTER - A4 ratio = 210:297 ≈ 1:1.414 */
.poster-wrap{flex-shrink:0;}
.poster{
  position:relative;
  width:400px;
  height:566px; /* A4 ratio */
  overflow:hidden;
  border-radius:8px;
  transition:box-shadow .5s;
}

.p-bg{position:absolute;inset:0;z-index:0;transition:background .5s;}
.p-rays{position:absolute;inset:0;z-index:1;}
.p-overlay{position:absolute;inset:0;z-index:5;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.35) 45%,rgba(0,0,0,.1) 70%,rgba(0,0,0,.4) 100%);}
.p-border-o{position:absolute;inset:8px;border:2.5px solid rgba(255,255,255,.4);border-radius:6px;z-index:10;pointer-events:none;transition:border-color .4s;}
.p-border-i{position:absolute;inset:15px;border:1px solid rgba(255,255,255,.18);border-radius:5px;z-index:10;pointer-events:none;}

.p-halo{position:absolute;top:55px;left:50%;transform:translateX(-50%);width:230px;height:230px;border-radius:50%;z-index:3;animation:halo 2.5s ease-in-out infinite alternate;}
@keyframes halo{0%{opacity:.6;transform:translateX(-50%) scale(1);}100%{opacity:1;transform:translateX(-50%) scale(1.1);}}

.p-img-wrap{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;height:100%;z-index:4;transform:none;}
.p-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:0;opacity:.85;}
.p-img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.2);color:rgba(255,255,255,.4);font-size:.8rem;gap:8px;cursor:pointer;}
.p-img-placeholder .big-icon{font-size:3rem;}

.p-top{position:absolute;top:16px;left:0;right:0;text-align:center;z-index:12;padding:0 30px;}
.p-om{font-size:1.7rem;line-height:1;animation:shimmer 2.5s ease-in-out infinite alternate;}
@keyframes shimmer{0%{filter:brightness(1);}100%{filter:brightness(1.4);}}
.p-verse{font-size:.68rem;color:rgba(255,235,180,.9);line-height:1.7;margin-top:4px;}

.p-diyas{position:absolute;top:215px;left:0;right:0;z-index:13;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none;}
.p-diya{font-size:1.5rem;animation:float 3s ease-in-out infinite alternate;}
.p-diya:last-child{animation-delay:1s;}
@keyframes float{0%{transform:translateY(0);}100%{transform:translateY(-7px);}}

.p-title{position:absolute;bottom:140px;left:0;right:0;text-align:center;z-index:12;padding:0 20px;}
.p-title-label{font-size:.6rem;color:rgba(255,220,120,.7);letter-spacing:4px;margin-bottom:3px;}
/* FIXED: solid color instead of gradient for PDF/print compatibility */
.p-title-main{font-size:2.5rem;font-weight:700;line-height:1.1;color:#ffd700;text-shadow:0 0 30px rgba(255,200,0,.6),0 2px 4px rgba(0,0,0,.5);}
.p-title-sub{font-size:.95rem;margin-top:4px;color:rgba(255,235,180,.95);text-shadow:0 1px 3px rgba(0,0,0,.5);}

.p-divider{position:absolute;bottom:135px;left:28px;right:28px;height:1px;background:linear-gradient(to right,transparent,rgba(255,220,80,.7),transparent);z-index:12;}

.p-name{position:absolute;bottom:55px;left:0;right:0;text-align:center;z-index:12;padding:0 36px;}
.p-name-label{font-size:.58rem;color:rgba(255,200,100,.65);letter-spacing:2px;margin-bottom:4px;}
.p-name-val{font-size:1.25rem;font-weight:700;color:#ffd700;min-height:32px;text-shadow:0 0 20px rgba(255,215,0,.5),0 2px 4px rgba(0,0,0,.5);}

.p-bottom{position:absolute;bottom:20px;left:0;right:0;text-align:center;z-index:12;font-size:.75rem;color:rgba(255,225,140,.8);letter-spacing:.5px;}

.p-particles{position:absolute;inset:0;z-index:3;pointer-events:none;}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;animation:pfloat linear infinite;opacity:0;}
@keyframes pfloat{0%{transform:translateY(0) translateX(0);opacity:0;}10%{opacity:.9;}90%{opacity:.3;}100%{transform:translateY(-400px) translateX(var(--dx));opacity:0;}}

/* CONTROLS */
.controls{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:14px;}
.ctrl-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:18px;}
.ctrl-section h3{color:rgba(255,215,100,.85);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08);}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{color:rgba(255,255,255,.6);font-size:.78rem;}
.field input,.field select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;color:#fff;font-size:.9rem;font-family:'Noto Serif Bengali',serif;outline:none;transition:border-color .2s;width:100%;}
.field input::placeholder{color:rgba(255,255,255,.25);}
.field input:focus,.field select:focus{border-color:rgba(255,215,0,.5);box-shadow:0 0 10px rgba(255,215,0,.12);}
.field select option{background:#1a1a2e;}

.img-upload-area{border:2px dashed rgba(255,255,255,.15);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.img-upload-area:hover{border-color:rgba(255,215,0,.4);}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-upload-area .upload-icon{font-size:1.8rem;margin-bottom:4px;}
.img-upload-area p{color:rgba(255,255,255,.45);font-size:.75rem;line-height:1.5;}
.img-upload-area.has-img p{color:rgba(100,255,150,.7);}

.sample-imgs{display:flex;gap:8px;margin-top:10px;}
.sample-img{width:60px;height:72px;border-radius:6px;object-fit:cover;object-position:top;cursor:pointer;border:2px solid transparent;transition:all .2s;opacity:.7;}
.sample-img:hover,.sample-img.active{border-color:#ffd700;opacity:1;transform:scale(1.05);}

.palette{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.pal-btn{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s;}
.pal-btn:hover{transform:scale(1.15);}
.pal-btn.active{border-color:#fff;transform:scale(1.15);}

.btn-main{width:100%;padding:13px;border-radius:10px;border:none;font-family:'Noto Serif Bengali',serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .25s;letter-spacing:.5px;}
.btn-dl{background:linear-gradient(135deg,#e65c00,#f9d423);color:#1a0a00;box-shadow:0 4px 20px rgba(230,92,0,.3);}
.btn-dl:hover{box-shadow:0 6px 30px rgba(230,92,0,.5);transform:translateY(-1px);}
.btn-reset{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);margin-top:4px;}
.btn-reset:hover{background:rgba(255,255,255,.12);color:#fff;}

/* ===== PRINT / SAVE ===== */
@media print{
  @page{
    size: A4 portrait;
    margin: 0;
  }
  *{
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
  body{
    background:#000 !important;
    padding:0 !important;
    display:block !important;
  }
  .festival-selector,
  .controls,
  .app-header,
  .main-layout > .controls{
    display:none !important;
  }
  .main-layout{
    display:block !important;
    width:100% !important;
    padding:0 !important;
    margin:0 !important;
  }
  .poster-wrap{
    display:block !important;
    width:100% !important;
    height:100% !important;
  }
  .poster{
    width:210mm !important;
    height:297mm !important;
    border-radius:0 !important;
    box-shadow:none !important;
    page-break-after: avoid;
  }
  .p-img-wrap{
    top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;
    width:100% !important;height:100% !important;transform:none !important;
  }
  .p-img-wrap img{opacity:.8 !important;}
  .p-halo{display:none !important;}
  .p-top{top:3% !important;}
  .p-om{font-size:2rem !important;}
  .p-verse{font-size:.82rem !important;}
  .p-diyas{display:none !important;}
  .p-title{bottom:18% !important;}
  .p-title-main{
    font-size:3.2rem !important;
    color:#ffd700 !important;
    -webkit-text-fill-color:#ffd700 !important;
    text-shadow:0 2px 8px rgba(0,0,0,.9),0 0 30px rgba(255,200,0,.6) !important;
  }
  .p-title-sub{font-size:1.1rem !important;}
  .p-divider{bottom:17% !important;}
  .p-name{bottom:9% !important;}
  .p-name-val{
    font-size:1.6rem !important;
    color:#ffd700 !important;
    -webkit-text-fill-color:#ffd700 !important;
    text-shadow:0 2px 8px rgba(0,0,0,.9) !important;
  }
  .p-bottom{bottom:4% !important;font-size:.9rem !important;}
}
</style>
</head>
<body>

<div class="app-header">
  <h1>🇮🇳 ভারতীয় উৎসব পোস্টার মেকার</h1>
  <p>উৎসব বেছে নিন → কাস্টমাইজ করুন → A4 পোস্টার সেভ করুন</p>
</div>

<div class="festival-selector">
  <h2>উৎসব বেছে নিন</h2>
  <div class="festival-grid" id="festivalGrid"></div>
</div>

<div class="main-layout">
  <div class="poster-wrap">
    <div class="poster" id="poster">
      <div class="p-bg" id="pBg"></div>
      <div class="p-rays" id="pRays"></div>
      <div class="p-overlay"></div>
      <div class="p-particles" id="pParticles"></div>
      <div class="p-halo" id="pHalo"></div>
      <div class="p-img-wrap">
        <div class="p-img-placeholder" id="imgPlaceholder" onclick="document.getElementById('mainImgInput').click()">
          <span class="big-icon">🖼️</span>
          <span>ছবি যোগ করুন</span>
        </div>
        <img id="posterImg" src="" alt="" style="display:none;">
      </div>
      <div class="p-top">
        <div class="p-om" id="pOm"></div>
        <div class="p-verse" id="pVerse"></div>
      </div>
      <div class="p-diyas" id="pDiyas">
        <span class="p-diya" id="diyaL"></span>
        <span class="p-diya" id="diyaR"></span>
      </div>
      <div class="p-title">
        <div class="p-title-label">— শুভ —</div>
        <div class="p-title-main" id="pTitleMain"></div>
        <div class="p-title-sub" id="pTitleSub">শুভেচ্ছা ও অভিনন্দন</div>
      </div>
      <div class="p-divider"></div>
      <div class="p-name">
        <div class="p-name-label" id="pNameLabel">— শুভেচ্ছায় —</div>
        <div class="p-name-val" id="pNameVal">আপনার নাম</div>
      </div>
      <div class="p-bottom" id="pBottom"></div>
      <div class="p-border-o" id="pBorderO"></div>
      <div class="p-border-i"></div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-section">
      <h3>✏️ টেক্সট</h3>
      <div class="field">
        <label>পোস্টারের শিরোনাম</label>
        <input type="text" id="titleInput" placeholder="যেমন: শুভ দুর্গাপূজা" maxlength="25">
      </div>
      <div class="field">
        <label>বার্তা</label>
        <input type="text" id="subtitleInput" placeholder="শুভেচ্ছা ও অভিনন্দন" maxlength="40">
      </div>
      <div class="field">
        <label>নামের উপরে লেখা</label>
        <input type="text" id="labelCustom" placeholder="যেমন: শুভেচ্ছায়, ভালোবাসায়..." maxlength="30">
      </div>
      <div class="field">
        <label>আপনার নাম</label>
        <input type="text" id="nameInput" placeholder="যেমন: বিকাশ বাউরি" maxlength="40">
      </div>
      <div class="field">
        <label>নিচের বার্তা</label>
        <input type="text" id="bottomInput" placeholder="জয় মা দুর্গা 🌸" maxlength="40">
      </div>
    </div>

    <div class="ctrl-section">
      <h3>🖼️ ছবি</h3>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" accept="image/*" id="mainImgInput">
        <div class="upload-icon">📁</div>
        <p>ফোন থেকে ছবি আপলোড করুন<br><small>অথবা নিচের নমুনা ছবি ব্যবহার করুন</small></p>
      </div>

let currentFest=festivals[10]; // রামনবমী default
let currentTitleColor='#ffd700';

// Build festival grid
const grid=document.getElementById('festivalGrid');
festivals.forEach(f=>{
  const btn=document.createElement('div');
  btn.className='fest-btn'+(f.id===currentFest.id?' active':'');
  btn.style.setProperty('--fest-color',f.color);
  btn.dataset.id=f.id;
  btn.innerHTML=`<span class="fest-icon">${f.icon}</span><span class="fest-name">${f.name}</span>`;
  btn.onclick=()=>selectFestival(f,btn);
  grid.appendChild(btn);
});

// Build palette
const palette=document.getElementById('palette');
colorThemes.forEach((t,i)=>{
  const b=document.createElement('div');
  b.className='pal-btn'+(i===0?' active':'');
  b.style.background=`linear-gradient(135deg,${t.c1},${t.c2})`;
  b.onclick=()=>{
    currentTitleColor=t.c1;
    document.getElementById('pTitleMain').style.color=t.c1;
    document.getElementById('pTitleMain').style.textShadow=`0 0 30px ${t.c1}88, 0 2px 4px rgba(0,0,0,.5)`;
    document.getElementById('pNameVal').style.color=t.c1;
    document.querySelectorAll('.pal-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  };
  palette.appendChild(b);
});

function selectFestival(f,btn){
  currentFest=f;
  document.querySelectorAll('.fest-btn').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  applyFestival(f);
  if(!document.getElementById('titleInput').value||document.getElementById('titleInput').dataset.auto==='1'){
    document.getElementById('titleInput').value=f.title;
    document.getElementById('titleInput').dataset.auto='1';
  }
  if(!document.getElementById('bottomInput').value||document.getElementById('bottomInput').dataset.auto==='1'){
    document.getElementById('bottomInput').value=f.bottom;
    document.getElementById('bottomInput').dataset.auto='1';
  }
  updatePosterText();
}

function applyFestival(f){
  document.getElementById('pBg').style.background=f.bg;
  document.getElementById('pHalo').style.background=`radial-gradient(circle,${f.halo} 0%,transparent 70%)`;
  document.getElementById('pOm').style.color=f.color;
  document.getElementById('pOm').textContent=f.om;
  document.getElementById('pVerse').textContent=f.verse;
  document.getElementById('diyaL').textContent=f.diya[0];
  document.getElementById('diyaR').textContent=f.diya[1];
  const tm=document.getElementById('pTitleMain');
  tm.style.color=currentTitleColor||f.color;
  tm.style.textShadow=`0 0 30px ${f.color}88, 0 2px 4px rgba(0,0,0,.6)`;
  document.getElementById('pBorderO').style.borderColor=`${f.color}80`;
  document.getElementById('poster').style.boxShadow=`0 0 60px ${f.color}44,0 0 120px ${f.color}22`;
  buildParticles(f.color);
}

function buildParticles(col){
  const pc=document.getElementById('pParticles');
  pc.innerHTML='';
  const colors=[col,'#ffd700','#fff'];
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${10+Math.random()*80}%;bottom:${Math.random()*10}%;animation-duration:${5+Math.random()*6}s;animation-delay:${Math.random()*4}s;--dx:${(Math.random()-.5)*40}px;background:${colors[i%colors.length]}`;
    pc.appendChild(p);
  }
}

function updatePosterText(){
  const t=document.getElementById('titleInput').value||currentFest.title;
  const s=document.getElementById('subtitleInput').value||'শুভেচ্ছা ও অভিনন্দন';
  const n=document.getElementById('nameInput').value||'আপনার নাম';
  const b=document.getElementById('bottomInput').value||currentFest.bottom;
  document.getElementById('pTitleMain').textContent=t;
  document.getElementById('pTitleSub').textContent=s;
  document.getElementById('pNameVal').textContent=n;
  document.getElementById('pBottom').textContent=b;
}

['titleInput','subtitleInput','nameInput','bottomInput'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    if(id==='titleInput'||id==='bottomInput') this.dataset.auto='0';
    updatePosterText();
  });
});

// label input
document.getElementById('labelCustom').addEventListener('input',function(){
  document.getElementById('pNameLabel').textContent=this.value?('— '+this.value+' —'):'— শুভেচ্ছায় —';
});

document.getElementById('mainImgInput').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    showPosterImg(ev.target.result);
    document.getElementById('uploadArea').classList.add('has-img');
    document.getElementById('uploadArea').querySelector('p').textContent='✅ ছবি যোগ হয়েছে';
    document.querySelectorAll('.sample-img').forEach(x=>x.classList.remove('active'));
  };
  reader.readAsDataURL(file);
});

function showPosterImg(src){
  const img=document.getElementById('posterImg');
  img.src=src;
  img.style.display='block';
  document.getElementById('imgPlaceholder').style.display='none';
}

document.getElementById('sampleImg1').addEventListener('click',function(){
  showPosterImg(sampleImgs.img2);
  document.querySelectorAll('.sample-img').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
});
document.getElementById('sampleImg2').addEventListener('click',function(){
  showPosterImg(sampleImgs.img1);
  document.querySelectorAll('.sample-img').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
});

function savePoster(){
  window.print();
}

function resetPoster(){
  ['titleInput','subtitleInput','nameInput','bottomInput'].forEach(id=>{
    const el=document.getElementById(id);
    el.value='';
    el.dataset.auto='0';
  });
  document.getElementById('posterImg').style.display='none';
  document.getElementById('imgPlaceholder').style.display='flex';
  document.getElementById('uploadArea').classList.remove('has-img');
  document.getElementById('uploadArea').querySelector('p').textContent='ফোন থেকে ছবি আপলোড করুন';
  document.querySelectorAll('.sample-img').forEach(x=>x.classList.remove('active'));
  updatePosterText();
}

// INIT
applyFestival(currentFest);
document.getElementById('titleInput').value=currentFest.title;
document.getElementById('titleInput').dataset.auto='1';
document.getElementById('bottomInput').value=currentFest.bottom;
document.getElementById('bottomInput').dataset.auto='1';
updatePosterText();
</script>
</body>
